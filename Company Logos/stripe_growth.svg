<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="Shenmay — Growth plan">
  <!-- Direction B editorial product card · paper / ink / teal · featured tier -->

  <!-- Paper background -->
  <rect width="800" height="500" fill="#F5F1E8"/>

  <!-- Featured accent strip (top edge, teal) -->
  <rect x="0" y="0" width="800" height="3" fill="#0F5F5C"/>

  <!-- Top strip: wordmark + plate caption -->
  <g font-family="'Inter','Helvetica Neue',Arial,sans-serif">
    <text x="48" y="46" font-size="24" font-weight="500" fill="#1A1D1A" letter-spacing="-0.5">Shenmay</text>
    <circle cx="158" cy="40" r="2.8" fill="#0F5F5C"/>
    <text x="752" y="44" font-family="ui-monospace, Menlo, monospace" font-size="10" font-weight="400" fill="#6B6B64" letter-spacing="2.2" text-anchor="end">PRICING · 2026</text>
  </g>

  <!-- Thin rule under top strip -->
  <line x1="48" y1="74" x2="752" y2="74" stroke="#D8D0BD" stroke-width="1"/>

  <!-- Kicker + FEATURED mark -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" font-weight="500" letter-spacing="1.8">
    <text x="48" y="130" fill="#0F5F5C">PLAN 02 · MANAGED AI</text>
    <rect x="648" y="114" width="104" height="22" fill="#0F5F5C"/>
    <text x="700" y="130" fill="#F5F1E8" text-anchor="middle" letter-spacing="2.2">FEATURED</text>
  </g>

  <!-- Main heading -->
  <g font-family="'Inter','Helvetica Neue',Arial,sans-serif" fill="#1A1D1A">
    <text x="48" y="212" font-size="68" font-weight="600" letter-spacing="-2.4">Scale with ease.</text>
    <text x="48" y="262" font-size="22" font-weight="400" fill="#3A3D39" letter-spacing="-0.3">Where most growing teams land.</text>
  </g>

  <!-- Price block -->
  <g font-family="'Inter','Helvetica Neue',Arial,sans-serif">
    <text x="48" y="336" font-family="ui-monospace, Menlo, monospace" font-size="10" font-weight="500" fill="#6B6B64" letter-spacing="2.2">SAAS · MONTHLY</text>
    <text x="48" y="394" font-size="58" font-weight="600" fill="#1A1D1A" letter-spacing="-2">$149<tspan font-size="22" font-weight="400" fill="#6B6B64" letter-spacing="0"> / mo</tspan></text>
  </g>

  <!-- Rule above features -->
  <line x1="48" y1="430" x2="752" y2="430" stroke="#D8D0BD" stroke-width="1"/>

  <!-- Feature row -->
  <g font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="400" fill="#3A3D39">
    <circle cx="54" cy="462" r="3" fill="#0F5F5C"/>
    <text x="66" y="466" letter-spacing="-0.1">250 customers</text>

    <circle cx="220" cy="462" r="3" fill="#0F5F5C"/>
    <text x="232" y="466" letter-spacing="-0.1">5,000 messages / month</text>

    <circle cx="450" cy="462" r="3" fill="#0F5F5C"/>
    <text x="462" y="466" letter-spacing="-0.1">Managed AI included</text>
  </g>

  <!-- Footer domain -->
  <text x="752" y="480" font-family="ui-monospace, Menlo, monospace" font-size="10" font-weight="400" fill="#6B6B64" letter-spacing="1.4" text-anchor="end">shenmay.ai</text>
</svg>
