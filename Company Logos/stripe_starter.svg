<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="Shenmay — Starter plan">
  <!-- Direction B editorial product card · paper / ink / teal -->
  <!-- Palette locked to client/src/components/shenmay/ui/ShenmayUI.jsx TOKENS -->

  <!-- Paper background -->
  <rect width="800" height="500" fill="#F5F1E8"/>

  <!-- Top strip: wordmark + plate caption -->
  <g font-family="'Inter','Helvetica Neue',Arial,sans-serif">
    <text x="48" y="44" font-size="24" font-weight="500" fill="#1A1D1A" letter-spacing="-0.5">Shenmay</text>
    <circle cx="158" cy="38" r="2.8" fill="#0F5F5C"/>
    <text x="752" y="42" font-family="ui-monospace, Menlo, monospace" font-size="10" font-weight="400" fill="#6B6B64" letter-spacing="2.2" text-anchor="end">PRICING · 2026</text>
  </g>

  <!-- Thin rule under top strip -->
  <line x1="48" y1="72" x2="752" y2="72" stroke="#D8D0BD" stroke-width="1"/>

  <!-- Kicker -->
  <text x="48" y="128" font-family="ui-monospace, Menlo, monospace" font-size="11" font-weight="500" fill="#0F5F5C" letter-spacing="1.8" text-transform="uppercase">PLAN 01 · SELF-SERVE</text>

  <!-- Main heading -->
  <g font-family="'Inter','Helvetica Neue',Arial,sans-serif" fill="#1A1D1A">
    <text x="48" y="210" font-size="68" font-weight="600" letter-spacing="-2.4">Get started.</text>
    <text x="48" y="260" font-size="22" font-weight="400" fill="#3A3D39" letter-spacing="-0.3">Know your customers from day one.</text>
  </g>

  <!-- Price block -->
  <g font-family="'Inter','Helvetica Neue',Arial,sans-serif">
    <text x="48" y="336" font-family="ui-monospace, Menlo, monospace" font-size="10" font-weight="500" fill="#6B6B64" letter-spacing="2.2">SAAS · MONTHLY</text>
    <text x="48" y="394" font-size="58" font-weight="600" fill="#1A1D1A" letter-spacing="-2">$49<tspan font-size="22" font-weight="400" fill="#6B6B64" letter-spacing="0"> / mo</tspan></text>
  </g>

  <!-- Rule above features -->
  <line x1="48" y1="430" x2="752" y2="430" stroke="#D8D0BD" stroke-width="1"/>

  <!-- Feature row -->
  <g font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="400" fill="#3A3D39">
    <circle cx="54" cy="462" r="3" fill="#0F5F5C"/>
    <text x="66" y="466" letter-spacing="-0.1">50 customers</text>

    <circle cx="220" cy="462" r="3" fill="#0F5F5C"/>
    <text x="232" y="466" letter-spacing="-0.1">1,000 messages / month</text>

    <circle cx="450" cy="462" r="3" fill="#0F5F5C"/>
    <text x="462" y="466" letter-spacing="-0.1">BYOK API key</text>
  </g>

  <!-- Footer domain -->
  <text x="752" y="480" font-family="ui-monospace, Menlo, monospace" font-size="10" font-weight="400" fill="#6B6B64" letter-spacing="1.4" text-anchor="end">shenmay.ai</text>
</svg>
