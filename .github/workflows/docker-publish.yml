# ============================================================
# Nomii AI — Docker Image Publisher
#
# Builds and pushes backend + frontend images to GitHub
# Container Registry (ghcr.io) automatically.
#
# Images are published to:
#   ghcr.io/YOUR_GITHUB_USERNAME/nomii-backend:latest
#   ghcr.io/YOUR_GITHUB_USERNAME/nomii-frontend:latest
#
# Triggers:
#   - Every push to main  → tags image as :latest
#   - Every version tag   → tags image as :v1.2.3 AND :latest
#     (create a tag with: git tag v1.0.0 && git push origin v1.0.0)
# ============================================================

name: Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/nomii-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/nomii-frontend

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      owner: ${{ github.repository_owner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.BACKEND_IMAGE }}
            ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Backend ─────────────────────────────────────────────
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ startsWith(github.ref, 'refs/tags/v') && format('{0}:{1}', env.BACKEND_IMAGE, github.ref_name) || '' }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend ────────────────────────────────────────────
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ startsWith(github.ref, 'refs/tags/v') && format('{0}:{1}', env.FRONTEND_IMAGE, github.ref_name) || '' }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Make packages public ────────────────────────────────────
  # GHCR packages default to private on first push.
  # This job flips both to public via the GitHub REST API.
  #
  # Requires a repo secret named PACKAGES_PAT containing a
  # classic PAT with the  write:packages  scope.
  # (Settings → Secrets → Actions → New repository secret)
  make-public:
    name: Make Packages Public
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      packages: write

    steps:
      - name: Set packages to public
        env:
          # Falls back to GITHUB_TOKEN; add PACKAGES_PAT for reliability
          TOKEN: ${{ secrets.PACKAGES_PAT || secrets.GITHUB_TOKEN }}
          OWNER: ${{ needs.build-and-push.outputs.owner }}
        run: |
          for pkg in nomii-backend nomii-frontend; do
            echo "Setting ${pkg} → public"
            http_code=$(curl -s -o /tmp/gh_resp.json -w "%{http_code}" \
              -X PATCH \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/user/packages/container/${pkg}" \
              -d '{"visibility":"public"}')
            echo "  HTTP ${http_code}"
            cat /tmp/gh_resp.json
            if [ "${http_code}" != "200" ]; then
              echo "::warning::Could not set ${pkg} to public (HTTP ${http_code}). Add a PACKAGES_PAT secret (write:packages scope) or change visibility manually at https://github.com/settings/packages"
            fi
          done
