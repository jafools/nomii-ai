# ============================================================
# Nomii AI — Docker Image Publisher
#
# Builds and pushes backend + frontend images to GitHub
# Container Registry (ghcr.io) automatically.
#
# Images are published to:
#   ghcr.io/YOUR_GITHUB_USERNAME/nomii-backend:latest
#   ghcr.io/YOUR_GITHUB_USERNAME/nomii-frontend:latest
#
# Triggers:
#   - Every push to main  → tags image as :latest
#   - Every version tag   → tags image as :v1.2.3 AND :latest
#     (create a tag with: git tag v1.0.0 && git push origin v1.0.0)
# ============================================================

name: Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/nomii-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/nomii-frontend

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.BACKEND_IMAGE }}
            ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Backend ─────────────────────────────────────────────
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ startsWith(github.ref, 'refs/tags/v') && format('{0}:{1}', env.BACKEND_IMAGE, github.ref_name) || '' }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend ────────────────────────────────────────────
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ startsWith(github.ref, 'refs/tags/v') && format('{0}:{1}', env.FRONTEND_IMAGE, github.ref_name) || '' }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
