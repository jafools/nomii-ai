# ============================================================
# Shenmay AI — Docker Image Publisher
#
# Release model (changed 2026-04-17):
#
#   main push     → :edge tag only (for internal staging/testing)
#   tag  v1.2.3   → :v1.2.3  +  :v1.2  +  :stable  +  :latest
#   manual run    → uses current ref (tag or branch)
#
# Why :edge on main?
#   Customers running the default self-hosted compose pin to :stable.
#   A push to main MUST NOT silently upgrade their production deployment.
#   To actually release, cut a tag:
#
#       git tag v1.2.3
#       git push origin v1.2.3
#
#   See docs/RELEASING.md for the full procedure.
#
# Images are published to:
#   ghcr.io/jafools/nomii-backend
#   ghcr.io/jafools/nomii-frontend
# ============================================================

name: Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/nomii-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/nomii-frontend

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      owner: ${{ github.repository_owner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Tag plan ────────────────────────────────────────────
      # Branch push to main       → :edge
      # Tag push v1.2.3           → :1.2.3, :1.2, :stable, :latest
      # workflow_dispatch on tag  → same as tag push
      # workflow_dispatch on main → :edge
      #
      # Each image (backend, frontend) computes its own tag set — do NOT
      # use a combined metadata-action that emits tags for both images.
      # The docker/build-push-action treats every tag in the list as
      # "push the image I just built to this name", so a combined list
      # would push backend content under the frontend's name (and vice
      # versa on the next step). Keep them separate.

      - name: Compute backend tags
        id: backend_tags
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Compute frontend tags
        id: frontend_tags
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      # ── Backend ─────────────────────────────────────────────
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ steps.backend_tags.outputs.tags }}
          labels: ${{ steps.backend_tags.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # ── Frontend ────────────────────────────────────────────
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: ${{ steps.frontend_tags.outputs.tags }}
          labels: ${{ steps.frontend_tags.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ── Make packages public ────────────────────────────────────
  # GHCR packages default to private on first push.
  # This job flips both to public via the GitHub REST API.
  #
  # Requires a repo secret named PACKAGES_PAT containing a
  # classic PAT with the  write:packages  scope.
  make-public:
    name: Make Packages Public
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      packages: write

    steps:
      - name: Set packages to public
        env:
          TOKEN: ${{ secrets.PACKAGES_PAT || secrets.GITHUB_TOKEN }}
          OWNER: ${{ needs.build-and-push.outputs.owner }}
        run: |
          for pkg in nomii-backend nomii-frontend; do
            echo "Setting ${pkg} → public"
            http_code=$(curl -s -o /tmp/gh_resp.json -w "%{http_code}" \
              -X PATCH \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/user/packages/container/${pkg}" \
              -d '{"visibility":"public"}')
            echo "  HTTP ${http_code}"
            cat /tmp/gh_resp.json
            if [ "${http_code}" != "200" ]; then
              echo "::warning::Could not set ${pkg} to public (HTTP ${http_code}). Add a PACKAGES_PAT secret (write:packages scope) or change visibility manually at https://github.com/settings/packages"
            fi
          done
