# ============================================================
# Nomii SaaS — Hetzner production overrides.
#
# This file is layered on top of docker-compose.yml via:
#   COMPOSE_FILE=docker-compose.yml:docker-compose.prod.override.yml
# in the Hetzner host's .env. (COMPOSE_FILE is a docker-compose
# built-in; no -f flags needed on the command line once set.)
#
# Resolves Finding #10 from docs/AUDIT-2026-04-17.md — previously
# these edits lived as uncommitted changes on the Hetzner host and
# depended on `git stash && git pull && git stash pop` to survive
# updates.
# ============================================================

services:
  backend:
    # Bind backend only to loopback. Cloudflare terminates TLS at the
    # nginx :443 block, which proxies to backend over the docker network.
    # The host should NEVER expose :3001 publicly — that would bypass
    # nginx + skip security headers.
    ports: !override
      - "127.0.0.1:3001:3001"

  frontend:
    # 80 is kept for Cloudflare probes / ACME verification; 443 is the
    # real customer-facing port.
    ports: !override
      - "80:80"
      - "443:443"
    volumes:
      # Cloudflare Origin CA cert + key. Lives outside docker — managed
      # by Austin, rotates before Cloudflare's 15-year expiry. See
      # CLAUDE.md for the cert path.
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro
      # Replace the image-baked nginx config with the :80+:443 prod one.
      # The image ships only :80 (on-prem customers don't need :443 —
      # they sit behind their own TLS terminator or Cloudflare Tunnel).
      - ./config/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
