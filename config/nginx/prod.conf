# ============================================================
# Nginx config for the Shenmay SaaS on Hetzner.
#
# This file is mounted at /etc/nginx/conf.d/default.conf by the
# docker-compose.prod.override.yml on the Hetzner host. It replaces
# the image-baked nginx.conf (which only has the :80 block).
#
# Server blocks:
#   :80                       — HTTP (Cloudflare probes / ACME). server_name _
#                               catches anything, serves the app (Cloudflare
#                               "Always Use HTTPS" upgrades real user traffic
#                               to :443 at the edge).
#   :443 shenmay.ai           — CANONICAL. Serves the app with the
#                               shenmay.ai Cloudflare Origin CA cert.
#   :443 www.shenmay.ai       — 301 permanent redirect to apex.
#   :443 nomii.pontensolutions.com
#                             — Legacy domain. Selective redirect:
#                               /api/*, /embed.js, /widget.html, /downloads/
#                               continue to serve normally so existing
#                               customer widget embeds + webhooks + Stripe
#                               callbacks don't break. Everything else
#                               (dashboard + SPA routes) 301s to shenmay.ai.
#   :443 default_server _     — Safety net. Serves the app with the legacy
#                               cert so any unrecognised SNI keeps working.
#
# Resolves Finding #10 from docs/AUDIT-2026-04-17.md — previously
# this config lived as uncommitted edits on the Hetzner filesystem.
# ============================================================

# ── Reusable proxy stanzas (kept inline for config-on-disk simplicity) ──

# ── :80 — public HTTP (behind Cloudflare) ────────────────────
server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location = /embed.js {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /widget.html {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # widget.html is loaded in iframes on third-party sites — do NOT
        # inherit X-Frame-Options: SAMEORIGIN. Any add_header in this block
        # suppresses server-level headers for this location.
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /downloads/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}

# ── :443 — shenmay.ai (CANONICAL) ────────────────────────────
server {
    listen 443 ssl;
    server_name shenmay.ai;

    # Cloudflare Origin CA cert issued against the shenmay.ai zone.
    # Lives outside docker, mounted read-only via docker-compose.prod.override.yml.
    ssl_certificate     /etc/ssl/shenmay/origin.pem;
    ssl_certificate_key /etc/ssl/shenmay/origin.key;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location = /embed.js {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /widget.html {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /downloads/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}

# ── :443 — www.shenmay.ai → apex redirect ────────────────────
server {
    listen 443 ssl;
    server_name www.shenmay.ai;

    ssl_certificate     /etc/ssl/shenmay/origin.pem;
    ssl_certificate_key /etc/ssl/shenmay/origin.key;

    return 301 https://shenmay.ai$request_uri;
}

# ── :443 — nomii.pontensolutions.com (LEGACY, selective redirect) ──
#
# Keeps the widget + webhook surface alive at the old domain so existing
# customer embeds + Stripe callbacks continue to work unchanged. Only
# the dashboard / SPA surface (anything that an end-user can bookmark)
# 301s to the new canonical domain. The 301 path scope will widen in
# Phase 8 (sunset) once telemetry shows no traffic on /api/* at this host.
server {
    listen 443 ssl;
    server_name nomii.pontensolutions.com;

    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;

    # Preserved surfaces — do NOT redirect.
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location = /embed.js {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /widget.html {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /downloads/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else — dashboard + SPA routes — 301 to the new domain.
    location / {
        return 301 https://shenmay.ai$request_uri;
    }
}

# ── :443 — default fallback (safety net) ─────────────────────
# Catches anything that didn't match a named server block. Serves the
# app with the legacy cert so misrouted requests don't hard-fail.
server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location = /embed.js {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /widget.html {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /downloads/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
