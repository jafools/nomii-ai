# ============================================================
# Shenmay AI — Self-Hosted
#
# This is the only file you need to run Shenmay AI on your
# own server. It pulls pre-built images from GitHub's
# container registry — no source code required.
#
# Quick start:
#   curl -sSL https://raw.githubusercontent.com/jafools/nomii-ai/main/scripts/install.sh | bash
#
# Manual start (after creating your .env):
#   docker compose -f docker-compose.selfhosted.yml up -d
# ============================================================

# ============================================================
# Shared log-rotation policy (Finding #9 — audit 2026-04-17).
# Caps each container's JSON log at ~50MB (5 files × 10MB).
# ============================================================
x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:

  # ── Database ──────────────────────────────────────────────
  db:
    image: postgres:16.9-alpine
    container_name: shenmay-db
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: shenmay_ai
      POSTGRES_USER: shenmay
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shenmay -d shenmay_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend API ───────────────────────────────────────────
  # Migrations run automatically on every start.
  backend:
    # Customers pin to :stable — this tag only moves on a tagged release
    # (see docs/RELEASING.md). Use :v1.2.3 to pin to a specific version,
    # or :edge to track the latest main commit (not recommended for prod).
    image: ghcr.io/jafools/shenmay-backend:stable
    container_name: shenmay-backend
    restart: unless-stopped
    logging: *default-logging
    environment:
      DATABASE_URL: postgresql://shenmay:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@db:5432/shenmay_ai
      PORT: 3001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      WIDGET_JWT_SECRET: ${WIDGET_JWT_SECRET}
      API_KEY_ENCRYPTION_SECRET: ${API_KEY_ENCRYPTION_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      APP_URL: ${APP_URL}
      PORTAL_URL: ${APP_URL}
      LLM_PROVIDER: ${LLM_PROVIDER:-claude}
      # ANTHROPIC_API_KEY is collected via the first-run setup wizard and
      # stored encrypted in the database. No need to set it here.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_API_KEY: ${ANTHROPIC_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      MASTER_EMAIL: ${MASTER_EMAIL:-}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      LLM_HAIKU_MODEL: ${LLM_HAIKU_MODEL:-claude-haiku-4-5-20251001}
      LLM_SONNET_MODEL: ${LLM_SONNET_MODEL:-claude-sonnet-4-20250514}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
      STRIPE_PRICE_GROWTH: ${STRIPE_PRICE_GROWTH:-}
      STRIPE_PRICE_PROFESSIONAL: ${STRIPE_PRICE_PROFESSIONAL:-}
      STRIPE_PORTAL_RETURN_URL: ${STRIPE_PORTAL_RETURN_URL:-}
      LOGIN_RATE_LIMIT_MAX: ${LOGIN_RATE_LIMIT_MAX:-3}
      WIDGET_SESSION_RATE_LIMIT_MAX: ${WIDGET_SESSION_RATE_LIMIT_MAX:-6}
      REGISTER_RATE_LIMIT_MAX: ${REGISTER_RATE_LIMIT_MAX:-3}
      # ── Deployment mode ───────────────────────────────────
      # Always 'selfhosted' for this compose file.
      # Enables single-tenant mode, disables SaaS registration,
      # and switches the dashboard to license-based billing.
      SHENMAY_DEPLOYMENT: selfhosted
      # ── Shenmay License ─────────────────────────────────────
      # Leave blank to start the free trial (20 messages/mo, 1 customer).
      # Purchase a paid license at: https://pontensolutions.com/shenmay/license
      # After purchase, paste your key in .env and restart the backend.
      SHENMAY_LICENSE_KEY: ${SHENMAY_LICENSE_KEY:-}
      # Optional: stable identifier for this instance across restarts.
      SHENMAY_INSTANCE_ID: ${SHENMAY_INSTANCE_ID:-}
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    image: ghcr.io/jafools/shenmay-frontend:stable
    container_name: shenmay-frontend
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
    depends_on:
      - backend

  # ── Cloudflare Tunnel (optional) ─────────────────────────
  # The easiest way to get a public HTTPS URL without opening
  # firewall ports or managing SSL certificates.
  #
  # This service only runs when activated via `profiles: [tunnel]`.
  # install.sh detects CLOUDFLARE_TUNNEL_TOKEN and adds --profile tunnel
  # automatically. To enable manually:
  #
  #   CLOUDFLARE_TUNNEL_TOKEN=eyJ... docker compose --profile tunnel \
  #     -f docker-compose.selfhosted.yml up -d
  #
  # The cloudflared image is distroless (no /bin/sh) so we can't use
  # a shell wrapper to no-op gracefully when the token is missing —
  # profiles is the clean way to keep it out of the base bring-up.
  cloudflared:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:2025.4.0
    container_name: shenmay-cloudflared
    restart: unless-stopped
    logging: *default-logging
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
    driver: local
