<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 305 40" fill="none">
  <defs>
    <linearGradient id="ai-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <text x="0" y="30" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="30" font-weight="800" fill="#f1f5f9" letter-spacing="-0.5">Pontén</text>
  <text x="115" y="30" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="30" font-weight="800" fill="url(#ai-glow)" filter="url(#glow)" letter-spacing="0.5">AI</text>
  <text x="150" y="30" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="30" font-weight="800" fill="#f1f5f9" letter-spacing="-0.5">Solutions</text>
</svg>