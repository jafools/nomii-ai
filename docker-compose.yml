# ============================================================
# Shared log-rotation policy (Finding #9 — audit 2026-04-17).
# Caps each container's JSON log at ~50MB (5 files × 10MB).
# json-file is the default driver; we're only adding rotation.
# ============================================================
x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  db:
    image: postgres:16.9-alpine
    container_name: shenmay-db
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: nomii_ai
      POSTGRES_USER: nomii
      # SECRETS FAIL FAST (Finding #1 — audit 2026-04-17).
      # The `:?` form refuses to start the container when the var is unset or
      # empty, eliminating the silent fallback to a committed dev value.
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nomii -d nomii_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # Backend API (Express.js)
  # ============================================
  # SaaS now pulls the same pre-built image that on-prem customers get
  # (Finding #11 — audit 2026-04-17). Source-build is no longer part of
  # the deploy path — the release flow (docs/RELEASING.md) is the only
  # way new code reaches production. Override IMAGE_TAG in .env to pin
  # to a specific version (e.g. v1.0.3); :stable tracks the latest
  # tagged release.
  backend:
    image: ghcr.io/jafools/shenmay-backend:${IMAGE_TAG:-stable}
    pull_policy: always
    container_name: shenmay-backend
    restart: unless-stopped
    logging: *default-logging
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://nomii:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@db:5432/nomii_ai}
      PORT: 3001
      # Required secrets fail-fast (Finding #1 — audit 2026-04-17).
      # Values are single-quoted because the `?` message contains colons,
      # which YAML would otherwise interpret as a mapping separator.
      JWT_SECRET: '${JWT_SECRET:?JWT_SECRET must be set in .env. Generate one via: openssl rand -hex 32}'
      WIDGET_JWT_SECRET: '${WIDGET_JWT_SECRET:?WIDGET_JWT_SECRET must be set in .env. Generate one via: openssl rand -hex 32}'
      API_KEY_ENCRYPTION_SECRET: '${API_KEY_ENCRYPTION_SECRET:?API_KEY_ENCRYPTION_SECRET must be set in .env. Generate one via: openssl rand -hex 32}'
      FRONTEND_URL: ${FRONTEND_URL:-https://nomii.pontensolutions.com}
      FRONTEND_URL_PROD: ${FRONTEND_URL_PROD:-}
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      NODE_ENV: production
      LOGIN_RATE_LIMIT_MAX: ${LOGIN_RATE_LIMIT_MAX:-3}
      WIDGET_SESSION_RATE_LIMIT_MAX: ${WIDGET_SESSION_RATE_LIMIT_MAX:-6}
      REGISTER_RATE_LIMIT_MAX: ${REGISTER_RATE_LIMIT_MAX:-3}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      APP_URL: ${APP_URL:-https://nomii.pontensolutions.com}
      MASTER_EMAIL: ${MASTER_EMAIL:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
      STRIPE_PRICE_GROWTH: ${STRIPE_PRICE_GROWTH:-}
      STRIPE_PRICE_PROFESSIONAL: ${STRIPE_PRICE_PROFESSIONAL:-}
      # Self-hosted license price IDs — used by /api/public/license/checkout
      # (the marketing-site /nomii/license page calls this to start a Stripe Checkout)
      STRIPE_SELFHOSTED_PRICE_STARTER_MONTHLY: ${STRIPE_SELFHOSTED_PRICE_STARTER_MONTHLY:-}
      STRIPE_SELFHOSTED_PRICE_GROWTH_MONTHLY: ${STRIPE_SELFHOSTED_PRICE_GROWTH_MONTHLY:-}
      STRIPE_SELFHOSTED_PRICE_PROFESSIONAL_MONTHLY: ${STRIPE_SELFHOSTED_PRICE_PROFESSIONAL_MONTHLY:-}
      STRIPE_SELFHOSTED_PRICE_STARTER_ANNUAL: ${STRIPE_SELFHOSTED_PRICE_STARTER_ANNUAL:-}
      STRIPE_SELFHOSTED_PRICE_GROWTH_ANNUAL: ${STRIPE_SELFHOSTED_PRICE_GROWTH_ANNUAL:-}
      STRIPE_SELFHOSTED_PRICE_PROFESSIONAL_ANNUAL: ${STRIPE_SELFHOSTED_PRICE_PROFESSIONAL_ANNUAL:-}
      STRIPE_PORTAL_RETURN_URL: ${STRIPE_PORTAL_RETURN_URL:-https://shenmay.ai/shenmay/dashboard/plans}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_HAIKU_MODEL: ${LLM_HAIKU_MODEL:-claude-haiku-4-5-20251001}
      LLM_SONNET_MODEL: ${LLM_SONNET_MODEL:-claude-sonnet-4-20250514}
      PORTAL_URL: ${PORTAL_URL:-https://shenmay.ai}
      # Both SHENMAY_* and NOMII_* accepted — SHENMAY_* wins if set.
      # NOMII_* kept for back-compat; removal in Phase 8 (~2026-10-20).
      SHENMAY_LICENSE_MASTER: ${SHENMAY_LICENSE_MASTER:-}
      NOMII_LICENSE_MASTER:   ${NOMII_LICENSE_MASTER:-true}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  # ============================================
  # Frontend (React + nginx)
  # ============================================
  # Pulled from GHCR — same image on-prem customers get. The docker-publish
  # workflow builds this with the Dockerfile default (VITE_API_BASE_URL=""),
  # so the client makes same-origin API calls — nginx (inside frontend)
  # proxies /api/* to the backend container over the docker network.
  frontend:
    image: ghcr.io/jafools/shenmay-frontend:${IMAGE_TAG:-stable}
    pull_policy: always
    container_name: shenmay-frontend
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
    depends_on:
      - backend

  # ============================================
  # Cloudflare Tunnel — exposes backend + frontend
  # publicly via api.pontensolutions.com (optional).
  # No port forwarding required.
  # Requires CLOUDFLARE_TUNNEL_TOKEN in .env
  #
  # Opt-in via the "tunnel" profile so a bare
  # `docker compose up -d` doesn't try to start it
  # with a blank token and restart-loop. Hetzner
  # prod uses Cloudflare Origin CA direct (no tunnel);
  # on-prem customers who want tunnel-based public
  # routing run `docker compose --profile tunnel up -d`.
  # ============================================
  cloudflared:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:2025.4.0
    container_name: shenmay-cloudflared
    restart: unless-stopped
    logging: *default-logging
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
    driver: local
