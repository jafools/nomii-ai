services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  db:
    image: postgres:16-alpine
    container_name: knomi-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: knomi_ai
      POSTGRES_USER: knomi
      POSTGRES_PASSWORD: ${DB_PASSWORD:-knomi_dev_2026}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knomi -d knomi_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # Backend API (Express.js)
  # ============================================
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: knomi-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://knomi:${DB_PASSWORD:-knomi_dev_2026}@db:5432/knomi_ai
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-nomii-dev-secret-change-in-production}
      WIDGET_JWT_SECRET: ${WIDGET_JWT_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL:-https://app.pontensolutions.com}
      FRONTEND_URL_PROD: ${FRONTEND_URL_PROD:-}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      NODE_ENV: production
      LOGIN_RATE_LIMIT_MAX: ${LOGIN_RATE_LIMIT_MAX:-3}
      WIDGET_SESSION_RATE_LIMIT_MAX: ${WIDGET_SESSION_RATE_LIMIT_MAX:-6}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      APP_URL: ${APP_URL:-https://nomii.pontensolutions.com}
      MASTER_EMAIL: ${MASTER_EMAIL:-}
      API_KEY_ENCRYPTION_SECRET: ${API_KEY_ENCRYPTION_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
      STRIPE_PRICE_GROWTH: ${STRIPE_PRICE_GROWTH:-}
      STRIPE_PRICE_PROFESSIONAL: ${STRIPE_PRICE_PROFESSIONAL:-}
      STRIPE_PORTAL_RETURN_URL: ${STRIPE_PORTAL_RETURN_URL:-https://nomii.pontensolutions.com/nomii/dashboard/plans}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  # ============================================
  # Frontend (React + nginx)
  # ============================================
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: knomi-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  # ============================================
  # Cloudflare Tunnel — exposes backend + frontend
  # publicly via api.nomii.pontensolutions.com
  # No port forwarding required.
  # Requires CLOUDFLARE_TUNNEL_TOKEN in .env
  # ============================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: knomi-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
    driver: local
